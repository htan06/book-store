<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore</title>
    <link rel="stylesheet" href="./bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <script src="./bootstrap/bootstrap-5.3.8-dist/js/bootstrap.min.js"></script>
    <script src="./script/home.js"></script>
    <script src="./script/main.js"></script>
    <style>
        .bg-cus {
            background-color: #F9F7F2;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <nav class="navbar navbar-expand-lg bg-cus px-5 sticky-top">
            <div class="container">
                <a href="#" class="navbar-brand px-3">
                    <img src="./static/img/logo.png" alt="Logo" style="width: 150px;">
                </a>
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="">Sách</a></li>
                    <li class="nav-item"><a class="nav-link" href="">Giới thiệu</a></li>
                    <li class="nav-item"><a class="nav-link" href="">Liên hệ</a></li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search">
                    <button class="btn btn-warning me-2" type="submit">Search</button>
                </form>
            </div>
        </nav>

        <div class="container" id="main"></div>

        <footer class=" px-3 pt-5 bg-cus">
            <div class="container">
                <div class="row">
                    <div class="col-md-3 text-left pl-5">
                        <img class="w-75 mb-3" src="./static/img/logo.png" alt="Logo">
                        <p><b>Địa chỉ:</b> Nguyễn Văn Bảo, Gò Vấp, TP. Hồ Chí Minh</p>
                        <p><b>Số điện thoại</b> 0123 456 789</p>
                        <p><b>Email:</b> bookstore@gmail.com</p>
                    </div>
                    <div class="col-md-3 text-left">
                        <h5>Menu</h5>
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item"><a class="nav-link" href="">Trang chủ</a></li>
                            <li class="nav-item"><a class="nav-link" href="">Sách</a></li>
                            <li class="nav-item"><a class="nav-link" href="">Giới thiệu</a></li>
                            <li class="nav-item"><a class="nav-link" href="">Liên hệ</a></li>
                        </ul>
                    </div>
                    <div class="col-md-6 text-center">
                        <h4>Đăng ký nhận thông báo qua email</h4>
                        <form class="d-flex" role="search">
                            <input class="form-control me-2" type="email" placeholder="example@example.com">
                            <button class="btn btn-primary me-2" type="submit">Gửi</button>
                        </form>
                    </div>
                </div>
            </div>
        </footer>
</body>

</html>
